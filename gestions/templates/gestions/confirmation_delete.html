{% extends 'base.html' %} {% block content %}
<h1 class="text-2xl font-bold text-red-600 mb-4">Supprimer {{title}}</h1>
<p class="mb-6">
  Êtes-vous sûr de vouloir supprimer {{title}}"<strong>{% if product %}{{ product.name }}{% endif %}</strong
  >" ? Cette action est irréversible.
</p>
<form method="post">
  {% csrf_token %}
  <div class="flex space-x-4">
    <button
      type="submit"
      class="bg-red-600 text-white px-6 py-2 rounded-lg hover:bg-red-700 transition"
    >
      Confirmer la suppression
    </button>
    <a
      href="{% url 'produit' %}"
      class="text-gray-600 hover:underline px-6 py-2"
      >Annuler</a
    >
  </div>
</form>
{% endblock %}
